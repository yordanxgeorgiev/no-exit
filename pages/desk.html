<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Desk</title>
</head>

<body>
    <p>A computer sits on the desk, its screen displaying a login prompt. You can attempt to log in.</p>
    <form action="/login" method="POST">
        <label>
            Username:
            <input type="text" name="username">
        </label>
        <br><br>

        <label>
            Password:
            <input type="password" name="password">
        </label>
        <br><br>

        <button type="submit">Submit</button>
    </form>

</body>

</html>
