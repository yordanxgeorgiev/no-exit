<body>
    <p>A one-act play set in a single room in hell where <b>Inez</b>, <b>Garcin</b> and <b>Estelle</b> are trapped
        together after
        death. With no escape or physical torture, they slowly realize their punishment is eternal psychological
        conflict, as each becomes the others' source of judgment and torment.
    </p>
